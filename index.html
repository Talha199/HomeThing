<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ev Bilgi Ekranı</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.09);
  --text: #f0ece0;
  --text2: #a09488;
  --text3: #5a5047;
  --accent: rgba(120,80,200,0.5);
  --accent-bg: rgba(120,80,200,0.15);
  --accent-border: rgba(120,80,200,0.35);
}
[data-theme="light"] {
  --bg: #f4f1eb;
  --bg2: rgba(0,0,0,0.04);
  --border: rgba(0,0,0,0.08);
  --text: #1a1714;
  --text2: #5a5047;
  --text3: #a09488;
  --accent: rgba(90,50,170,0.5);
  --accent-bg: rgba(90,50,170,0.1);
  --accent-border: rgba(90,50,170,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; } /* Prevents unwanted scrolling */
body {
  background: var(--bg); color: var(--text);
  font-family: 'Nunito', sans-serif; font-weight: 700;
  transition: background 0.4s ease, color 0.4s ease;
  display: flex; flex-direction: column;
}

/* THEME BTN */
.theme-btn {
  position: absolute; top: 12px; right: 12px; z-index: 999;
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 50%; width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; transition: background 0.2s;
}
.theme-btn:active { background: var(--border); }

/* PAGE LAYOUT */
.page { 
  padding: 12px; width: 100%; height: 100%; 
  display: flex; flex-direction: column; 
  overflow-y: auto; scrollbar-width: none;
}
.page::-webkit-scrollbar { display: none; }

.col-left, .col-right { width: 100%; display: flex; flex-direction: column; gap: 10px; }

/* DYNAMIC LANDSCAPE GRID */
@media (min-width: 600px) and (orientation: landscape) {
  .page {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 100%;
    column-gap: 16px;
    align-items: stretch;
    padding: 16px;
    overflow: hidden; /* Fully locked layout on landscape tablets */
  }
  .col-left, .col-right { height: 100%; overflow-y: auto; scrollbar-width: none; }
  .col-left::-webkit-scrollbar, .col-right::-webkit-scrollbar { display: none; }
}

/* CLOCK */
.clock-section { text-align: center; padding: 5px 0 10px; flex-shrink: 0; }
.time {
  font-size: clamp(48px, 12vh, 80px); /* Height-based scaling to save vertical space */
  font-weight: 900; letter-spacing: -2px; color: var(--text); line-height: 0.9;
}
.colon { animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.date-line {
  font-size: clamp(11px, 2.5vh, 14px); font-weight: 700; color: var(--text3);
  letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px;
}

/* CARDS & ACCORDIONS */
.card {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 16px; padding: 14px; 
  transition: background 0.3s;
  display: flex; flex-direction: column;
}
.interactive-card { cursor: pointer; }
.interactive-card:active { background: var(--border); }

.section-label {
  font-size: 10px; font-weight: 800; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.chevron { font-size: 12px; transition: transform 0.3s ease; }

/* ACCORDION ANIMATION (Grid 0fr trick) */
.accordion-wrapper {
  display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease-in-out;
}
.accordion-inner { overflow: hidden; }
.card.open .accordion-wrapper { grid-template-rows: 1fr; }
.card.open .chevron { transform: rotate(180deg); }

/* WEATHER NOW (Header) */
.weather-now { display: flex; align-items: center; gap: 12px; }
.weather-icon { font-size: clamp(36px, 8vh, 50px); line-height: 1; flex-shrink: 0; }
.weather-main { flex: 1; min-width: 0; }
.weather-temp { font-size: clamp(28px, 6vh, 42px); font-weight: 900; color: var(--text); line-height: 1; }
.weather-city { font-size: 13px; font-weight: 800; color: var(--text2); margin-top: 2px; }
.weather-desc { font-size: 12px; font-weight: 700; color: var(--text3); margin-top: 1px; }

/* 4-HOUR SUMMARY (Always visible) */
.weather-4h { display: flex; gap: 6px; margin-top: 12px; }
.weather-4h .hourly-item { flex: 1; min-width: 0; }

/* HOURLY & DETAILS */
.hourly-item {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 12px; padding: 8px 4px; text-align: center; 
}
.hourly-item.now { background: var(--accent-bg); border-color: var(--accent-border); }
.hourly-time { font-size: 10px; font-weight: 700; color: var(--text3); margin-bottom: 2px; }
.hourly-ico { font-size: 18px; line-height: 1; margin-bottom: 2px; }
.hourly-temp { font-size: 12px; font-weight: 800; color: var(--text2); }
.hourly-rain { font-size: 9px; font-weight: 700; color: #4a7090; margin-top: 1px; min-height: 12px; }

/* EXTENDED DETAILS (Hidden by default) */
.weather-meta { display: flex; gap: 10px; margin: 12px 0; flex-wrap: wrap; }
.weather-meta span { font-size: 11px; font-weight: 700; color: var(--text3); background: var(--bg); padding: 4px 8px; border-radius: 6px;}
.weather-meta span strong { color: var(--text2); font-weight: 800; }

.hourly-scroll {
  overflow-x: auto; display: flex; gap: 6px; padding-bottom: 8px; 
  scrollbar-width: none; scroll-snap-type: x mandatory;
}
.hourly-scroll::-webkit-scrollbar { display: none; }
.hourly-scroll .hourly-item { min-width: 52px; scroll-snap-align: start; flex-shrink: 0; }

.forecast-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.forecast-item { display: flex; align-items: center; gap: 8px; background: var(--bg2); padding: 6px 10px; border-radius: 10px;}
.forecast-day { font-size: 12px; font-weight: 800; color: var(--text2); width: 60px; flex-shrink: 0; }
.forecast-ico { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
.forecast-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; position: relative; overflow: hidden; min-width: 0; }
.forecast-bar-fill { position: absolute; top: 0; height: 100%; background: var(--accent); border-radius: 2px; }
.forecast-temps { display: flex; gap: 6px; font-size: 11px; flex-shrink: 0; }
.forecast-max { color: var(--text); font-weight: 900; }
.forecast-min { color: var(--text3); font-weight: 700; }

.divider { height: 1px; background: var(--border); margin: 12px 0; }

/* NAMAZ */
.namaz-section { display: flex; flex-direction: column; }
.nv-widget-wrapper {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 14px; overflow: hidden; width: 100%; flex: 1;
}
.nv-widget-wrapper > div, .nv-widget-wrapper iframe, .nv-widget-wrapper .nv-widget { width: 100% !important; max-width: 100% !important; }

/* NOTES */
.notes-area {
  width: 100%; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 700; line-height: 1.6;
  resize: none; min-height: 80px; caret-color: var(--text2);
  margin-top: 4px;
}
.notes-area::placeholder { color: var(--text3); }
.notes-saved {
  font-size: 9px; font-weight: 700; color: transparent;
  text-align: right; margin-top: 2px; letter-spacing: 1px;
  transition: color 0.3s; min-height: 13px;
}
.notes-saved.show { color: var(--text3); }
.loading { font-size: 12px; font-weight: 700; color: var(--text3); text-align: center; padding: 20px;}
</style>
</head>
<body>
<button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
<div class="page">
  
  <div class="col-left">
    <!-- CLOCK -->
    <div class="clock-section">
      <div class="time" id="clock">00<span class="colon">:</span>00</div>
      <div class="date-line" id="datestr">—</div>
    </div>

    <!-- COLLAPSIBLE WEATHER CARD -->
    <div class="card interactive-card" id="weather-card" onclick="toggleCard('weather-card')">
      <div class="section-label">Hava Durumu <span class="chevron">▼</span></div>
      
      <!-- Always visible header -->
      <div id="weather-now-container"><div class="loading">konum bekleniyor…</div></div>
      
      <!-- Always visible next 4 hours -->
      <div class="weather-4h" id="weather-4h-container"></div>

      <!-- Collapsible Detailed Weather -->
      <div class="accordion-wrapper">
        <div class="accordion-inner" id="weather-details-container">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <div class="col-right">
    <!-- PRAYER TIMES -->
    <div class="namaz-section flex-1">
      <div class="section-label" style="padding: 0 4px;">Namaz Vakitleri</div>
      <div class="nv-widget-wrapper">
        <div class="nv-widget" data-lang="tr" data-search="disabled" data-cityId="1183" data-countdown="true" data-prayerTimes="row" data-width="370" style="width:100%;"></div>
      </div>
    </div>

    <!-- COLLAPSIBLE NOTES -->
    <div class="card interactive-card" id="notes-card" onclick="toggleCard('notes-card', event)">
      <div class="section-label">Notlar <span class="chevron">▼</span></div>
      <div class="accordion-wrapper">
        <div class="accordion-inner">
          <textarea class="notes-area" id="notes" placeholder="Hatırlatıcı veya not ekle..." rows="3"></textarea>
          <div class="notes-saved" id="notes-saved">kaydedildi</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script async defer crossorigin="anonymous" src="https://namazvakitleri.com.tr/widget.js"></script>
<script>
const DAYS=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const DS=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
const MONTHS=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

// CLOCK
function updateClock(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0'), m=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock').innerHTML=h+'<span class="colon">:</span>'+m;
  document.getElementById('datestr').textContent=DAYS[n.getDay()]+', '+n.getDate()+' '+MONTHS[n.getMonth()]+' '+n.getFullYear();
}
updateClock(); setInterval(updateClock,1000);

// THEME
function toggleTheme(){
  const h=document.documentElement, dark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('theme-btn').textContent=dark?'🌙':'☀️';
  localStorage.setItem('dashboard-theme',dark?'light':'dark');
}
const st=localStorage.getItem('dashboard-theme');
if(st){ document.documentElement.setAttribute('data-theme',st); document.getElementById('theme-btn').textContent=st==='dark'?'☀️':'🌙'; }

// ACCORDION TOGGLE
function toggleCard(id, event) {
  // Prevent toggling when typing in textarea
  if(event && event.target.tagName.toLowerCase() === 'textarea') return;
  document.getElementById(id).classList.toggle('open');
}

// Open notes by default if there's text, or if on large screen
window.onload = () => {
  if(document.getElementById('notes').value.trim() !== "" || window.innerWidth > 600) {
    document.getElementById('notes-card').classList.add('open');
  }
};


// WEATHER LOGIC
const WI={0:['☀️','Açık'],1:['🌤️','Az Bulutlu'],2:['⛅','Parçalı Bulutlu'],3:['☁️','Kapalı'],45:['🌫️','Sisli'],48:['🌫️','Donlu Sis'],51:['🌦️','Hafif Çisenti'],53:['🌦️','Çisenti'],55:['🌧️','Yoğun Çisenti'],61:['🌧️','Hafif Yağmur'],63:['🌧️','Yağmurlu'],65:['🌧️','Şiddetli Yağmur'],71:['🌨️','Hafif Kar'],73:['❄️','Karlı'],75:['❄️','Yoğun Kar'],80:['🌦️','Sağanak'],81:['🌧️','Sağanak'],82:['⛈️','Şiddetli Sağanak'],95:['⛈️','Fırtınalı'],96:['⛈️','Dolu'],99:['⛈️','Şiddetli Dolu']};
function wi(c){return WI[c]||['🌡️','Bilinmiyor'];}

async function getCity(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=tr`);
    const d=await r.json();
    return d.address.city||d.address.town||d.address.village||d.address.county||'';
  }catch{return '';}
}

async function fetchWeather(lat,lon){
  const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weathercode&hourly=temperature_2m,weathercode,precipitation_probability&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=6`);
  return r.json();
}

function renderWeatherUI(data, city) {
  const c = data.current; 
  const [icon, desc] = wi(c.weathercode);
  const now = new Date();
  
  // 1. HEADER (NOW)
  document.getElementById('weather-now-container').innerHTML = `
    <div class="weather-now">
      <div class="weather-icon">${icon}</div>
      <div class="weather-main">
        <div class="weather-temp">${Math.round(c.temperature_2m)}°</div>
        ${city?`<div class="weather-city">${city}</div>`:''}
        <div class="weather-desc">${desc}</div>
      </div>
    </div>`;

  // 2. HOURLY DATA PARSING
  const {time:times, temperature_2m:temps, weathercode:codes, precipitation_probability:rains} = data.hourly;
  let html4h = '';
  let html24h = '';
  let count = 0;

  for(let i=0; i<times.length && count<24; i++){
    const t = new Date(times[i]);
    const isNow = t.getHours() === now.getHours() && t.getDate() === now.getDate();
    
    // Skip past hours
    if(t < now && !isNow) continue;
    
    const [ico] = wi(codes[i]);
    const label = isNow ? 'Şimdi' : String(t.getHours()).padStart(2,'0')+':00';
    const itemHtml = `<div class="hourly-item${isNow?' now':''}"><div class="hourly-time">${label}</div><div class="hourly-ico">${ico}</div><div class="hourly-temp">${Math.round(temps[i])}°</div><div class="hourly-rain">${rains[i]>0?'%'+rains[i]:''}</div></div>`;
    
    if (count < 4) { html4h += itemHtml; } // First 4 go to summary
    html24h += itemHtml;                   // All 24 go to scroll
    count++;
  }

  document.getElementById('weather-4h-container').innerHTML = html4h;

  // 3. 5-DAY FORECAST PARSING
  const {time:dTime, weathercode:dCodes, temperature_2m_max:maxT, temperature_2m_min:minT} = data.daily;
  const absMax=Math.max(...maxT), absMin=Math.min(...minT), range=absMax-absMin||1;
  let html5d = '';
  
  for(let i=1; i<6; i++){
    const d = new Date(dTime[i]);
    const [ico] = wi(dCodes[i]);
    const max = Math.round(maxT[i]), min = Math.round(minT[i]);
    const left = ((minT[i]-absMin)/range*100).toFixed(1);
    const width = Math.max(((maxT[i]-minT[i])/range*100), 5).toFixed(1);
    
    html5d += `<div class="forecast-item"><div class="forecast-day">${i===1?'Yarın':DS[d.getDay()]}</div><div class="forecast-ico">${ico}</div><div class="forecast-bar"><div class="forecast-bar-fill" style="left:${left}%;width:${width}%"></div></div><div class="forecast-temps"><span class="forecast-min">${min}°</span><span class="forecast-max">${max}°</span></div></div>`;
  }

  // 4. BUILD DETAILS CONTAINER
  document.getElementById('weather-details-container').innerHTML = `
    <div class="divider"></div>
    <div class="weather-meta">
      <span>Nem <strong>${c.relative_humidity_2m}%</strong></span>
      <span>Rüzgar <strong>${Math.round(c.wind_speed_10m)} km/s</strong></span>
    </div>
    <div class="section-label" style="margin-top:12px;">24 Saatlik Tahmin</div>
    <div class="hourly-scroll">${html24h}</div>
    <div class="section-label" style="margin-top:12px;">5 Günlük Tahmin</div>
    <div class="forecast-list">${html5d}</div>
  `;
}

function loadWeather(){
  if(!navigator.geolocation){
    document.getElementById('weather-now-container').innerHTML='<div class="loading">konum desteklenmiyor</div>';
    return;
  }
  navigator.geolocation.getCurrentPosition(async pos=>{
    try {
      const {latitude:lat, longitude:lon} = pos.coords;
      const [data, city] = await Promise.all([fetchWeather(lat,lon), getCity(lat,lon)]);
      renderWeatherUI(data, city);
    } catch {
      document.getElementById('weather-now-container').innerHTML='<div class="loading">hava durumu alınamadı</div>';
    }
  },()=>{
    document.getElementById('weather-now-container').innerHTML='<div class="loading">konum izni verilmedi</div>';
  });
}
loadWeather(); setInterval(loadWeather, 15*60*1000); // Refresh 15m

// NOTES
const notesEl = document.getElementById('notes');
const savedEl = document.getElementById('notes-saved');
notesEl.value = localStorage.getItem('dashboard-notes') || '';
let saveTimer;
notesEl.addEventListener('input', () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem('dashboard-notes', notesEl.value);
    savedEl.classList.add('show');
    setTimeout(() => savedEl.classList.remove('show'), 2000);
  }, 800);
});
</script>
</body>
</html>
